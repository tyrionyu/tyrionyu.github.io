<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>报价系统 v1.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Sora:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Serif+SC:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar__inner">
      <div class="brand">
        <span class="brand__logo">¥</span>
        <div>
          <h1 class="brand__title">报价系统 <span class="brand__ver">v1.0</span></h1>
          <p class="brand__sub">实时报价 · 工艺费用 XLOOKUP 联动 · 导出 Excel / PDF</p>
        </div>
      </div>
      <div class="topbar__total">
        <span>总金额</span>
        <strong id="amt-grand-top">¥ 0.00</strong>
      </div>
      <div class="topbar__actions">
        <button class="btn btn--ghost" id="btn-sample" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg>
          <span>载入示例</span>
        </button>
        <button class="btn btn--ghost" id="btn-reset" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          <span>重置</span>
        </button>
        <button class="btn" id="btn-export-pdf" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M9 15l3 3 3-3"/><path d="M12 18v-6"/></svg>
          <span>导出 PDF</span>
        </button>
        <button class="btn btn--primary" id="btn-export-excel" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg>
          <span>导出 Excel</span>
        </button>
      </div>
    </div>
  </header>

  <main class="layout">
    <!-- 左侧：报价预览 -->
    <section class="preview-pane">
      <div class="pane-title">报价预览</div>
      <div class="preview-scroll" id="preview"></div>
    </section>

    <!-- 右侧：操作面板 -->
    <aside class="config-pane">
      <div class="pane-title">操作面板</div>
      <div class="config-scroll" id="panel"></div>
      <div class="panel-foot">
        <span>总金额</span>
        <strong id="amt-grand-panel">¥ 0.00</strong>
      </div>
    </aside>
  </main>

  <!-- 本地依赖（离线可用） -->
  <script src="lib/xlsx.full.min.js"></script>
  <script src="lib/jspdf.umd.min.js"></script>
  <!-- 应用脚本 -->
  <script src="js/data.js"></script>
  <script src="js/calc.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/excel.js"></script>
  <script src="js/pdf.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
